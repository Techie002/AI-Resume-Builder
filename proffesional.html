<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{name}} - Professional Resume</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            padding: 40px;
        }
        
        .resume {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .top-bar {
            height: 8px;
            background: linear-gradient(90deg, #0f62ac, #8a3ffc);
        }
        
        .container {
            display: flex;
            padding: 30px;
        }
        
        .sidebar {
            width: 33%;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }
        
        .main {
            width: 67%;
            padding-left: 30px;
        }
        
        .name {
            font-size: 32px;
            font-weight: 700;
            color: #0f62ac;
            margin-bottom: 5px;
        }
        
        .title {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #0f62ac;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #0f62ac;
            margin: 20px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .contact-item {
            margin: 10px 0;
            font-size: 13px;
            color: #555;
        }
        
        .skill-tag {
            display: inline-block;
            background: #0f62ac;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            margin: 3px;
        }
        
        .achievement-bullet {
            margin: 10px 0;
            padding-left: 20px;
            position: relative;
        }
        
        .achievement-bullet:before {
            content: "▹";
            position: absolute;
            left: 0;
            color: #0f62ac;
        }
        
        .summary-text {
            line-height: 1.6;
            color: #333;
            font-size: 14px;
        }
        
        @media (max-width: 700px) {
            .container { flex-direction: column; }
            .sidebar, .main { width: 100%; padding: 0; }
            .sidebar { margin-bottom: 20px; }
            .main { padding-left: 0; }
        }
    </style>
</head>
<body>
    <div class="resume">
        <div class="top-bar"></div>
        <div class="container">
            <div class="sidebar">
                <div class="name">{{name}}</div>
                <div class="title">{{title}}</div>
                
                <div class="section-title">Contact</div>
                <div class="contact-item">📧 {{email}}</div>
                <div class="contact-item">📞 {{phone}}</div>
                
                <div class="section-title">Skills</div>
                <div>
                    {{skills_html}}
                </div>
            </div>
            
            <div class="main">
                <div class="section-title">Profile</div>
                <div class="summary-text">{{summary}}</div>
                
                <div class="section-title">Achievements</div>
                {{achievements}}
            </div>
        </div>
    </div>
</body>
</html>
