<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{name}} - Classic Resume</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Times New Roman', Times, serif;
            background: #e8e8e8;
            padding: 40px;
        }
        
        .resume {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        
        .header {
            background: #2c3e50;
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        .header p {
            font-size: 18px;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .section {
            margin-bottom: 25px;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
        }
        
        .section h2 {
            color: #2c3e50;
            font-size: 20px;
            margin-bottom: 15px;
        }
        
        .contact-info {
            text-align: center;
            padding: 15px;
            background: #f5f5f5;
            margin-bottom: 20px;
        }
        
        .contact-info p {
            margin: 5px 0;
        }
        
        .achievement {
            margin: 10px 0;
            padding-left: 20px;
        }
        
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .skill {
            background: #2c3e50;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            body { padding: 20px; }
            .header h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="resume">
        <div class="header">
            <h1>{{name}}</h1>
            <p>{{title}}</p>
        </div>
        
        <div class="contact-info">
            <p>📧 {{email}} | 📞 {{phone}}</p>
        </div>
        
        <div class="content">
            <div class="section">
                <h2>Professional Summary</h2>
                <p>{{summary}}</p>
            </div>
            
            <div class="section">
                <h2>Key Achievements</h2>
                {{achievements}}
            </div>
            
            <div class="section">
                <h2>Technical Skills</h2>
                <div class="skills">
                    {{skills_html}}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
